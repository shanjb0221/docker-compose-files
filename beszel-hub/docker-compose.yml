name: beszel-hub

services:
  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: always
    environment:
      APP_URL: ${APP_URL}
    volumes:
      - ./data:/beszel_data
      - ./socket:/beszel_socket
    network_mode: container:tailscale

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: always
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./agent:/var/lib/beszel-agent
      - ./socket:/beszel_socket
    environment:
      LISTEN: /beszel_socket/beszel.sock
      KEY: ${BESZEL_KEY}
      TOKEN: ${BESZEL_TOKEN}
      HUB_URL: ${APP_URL}

