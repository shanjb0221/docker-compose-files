name: tailscale

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    container_name: tailscale
    cap_add: [net_admin, net_raw]
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./state:/var/lib/tailscale
    network_mode: host
    env_file: .env

